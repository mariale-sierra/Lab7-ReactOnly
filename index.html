<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Snake con React</title>
  <style>
    .board {
      display: grid;
      grid-template-columns: repeat(20, 20px);
      grid-template-rows: repeat(20, 20px); 
      gap: 2px;
      justify-content: center;
      position: relative;
    }

    .cell1 {
      width: 20px;
      height: 20px;
      background: #d5ffb0;
    }

    .cell2 {
      width: 20px;
      height: 20px;
      background: #afd191;
    }

    .snake {
      background: rgb(0, 111, 0);
    }

    .food {
    width: 20px;
    height: 20px;
    background: red;
    position: absolute;
    }
  </style>
</head>
<body>

<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

function Game() {
  const [snake, setSnake] = React.useState([[5, 5]]);
  const [food, setFood] = React.useState([10, 10]);
  const [score, setScore] = React.useState(0);
  const [direction, setDirection] = React.useState("RIGHT");

  React.useEffect(() => {
    function handleKey(e) {
      switch (e.key) {
        case "ArrowUp":
          setDirection("UP");
          break;
        case "ArrowDown":
          setDirection("DOWN");
          break;
        case "ArrowLeft":
          setDirection("LEFT");
          break;
        case "ArrowRight":
          setDirection("RIGHT");
          break;
      }
    }
    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
  }, []);

  React.useEffect(() => {
    const interval = setInterval(() => {
      moveSnake();
    }, 200);
    window.focus();
    return () => clearInterval(interval);
  }, [snake, direction]);

  function moveSnake() {
    const newSnake = [...snake];
    const head = newSnake[0];

    let newHead;

    switch (direction) {
      case "RIGHT":
        newHead = [head[0] + 1, head[1]];
        break;
      case "LEFT":
        newHead = [head[0] - 1, head[1]];
        break;
      case "UP":
        newHead = [head[0], head[1] - 1];
        break;
      case "DOWN":
        newHead = [head[0], head[1] + 1];
        break;
    }

    if (newHead[0] === food[0] && newHead[1] === food[1]) {
      setScore(prev => prev + 1);
      setFood([
        Math.floor(Math.random() * 20),
        Math.floor(Math.random() * 20)
      ]);
        } else {
        newSnake.pop();
        }

        if (
    newHead[0] < 0 ||
    newHead[0] >= 20 ||
    newHead[1] < 0 ||
    newHead[1] >= 20
    ) {
    alert("Game Over");
    setSnake([[5, 5]]);
    setScore(0);
    return;
    }

    newSnake.unshift(newHead);
    setSnake(newSnake);
  }

  return (
    <div>
      <h1>Snake</h1>
      <Score score={score} />
      <Board snake={snake} food={food} />
    </div>
  );
}

function Board({ snake, food }) {
  const size = 20;
  const cells = [];

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {

      let className = (x + y) % 2 === 0 ? "cell1" : "cell2";

      if (snake.some(seg => seg[0] === x && seg[1] === y)) {
        className += " snake";
      }

      cells.push(
        <div key={`${x}-${y}`} className={className}></div>
      );
    }
  }

  return (
    <div className="board">
      {cells}
      <Food position={food} />
    </div>
  );
}

function Food({ position }) {
  const style = {
    gridColumnStart: position[0] + 1,
    gridRowStart: position[1] + 1,
  };

  return <div className="food" style={style}></div>;
}

function Score({ score }) {
  return <h2>Puntaje: {score}</h2>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Game />);

</script>

</body>
</html>
